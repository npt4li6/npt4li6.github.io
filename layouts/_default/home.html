{{ define "main" }}
  {{ partial "title.html" . }}
  {{ partial "categories.html" . }}
  {{ range where .Site.RegularPages "Params.featured" true }}

      <h2 style="padding: 1rem"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      {{ partial "gallery.html" . }}
    </section>
  {{ end }}
{{ end }}
