{{ define "main" }}
  {{ partial "title.html" . }}
  <section class="galleries">
    {{ range where .Pages "Params.private" "ne" true }}
      {{ if eq .Layout "prose" }}
        <a class="card" href="{{ .RelPermalink }}" title="{{ .Title }}">
          <div>
            <h2>{{ .Title }}</h2>
            <p>{{ .Date.Format "January 2, 2006" }}</p>
          </div>
        </a>
      {{ else }}
        {{ partial "album-card.html" . }}
      {{ end }}
    {{ end }}
  </section>
{{ end }}
